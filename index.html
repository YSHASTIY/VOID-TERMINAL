<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DEAD MAN BINGO | MULTIPLAYER PROTOCOL</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

    /* Глобальные настройки и запрет выделения */
    * { 
      box-sizing: border-box; 
      cursor: crosshair; 
      user-select: none; 
      -webkit-user-select: none; 
      -webkit-tap-highlight-color: transparent;
    }

    html, body { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      background: #000; color: #b0a090; 
      font-family: 'Share Tech Mono', monospace; 
      overflow: hidden; 
    }

    .screen-layer { 
      display: none; width: 100vw; height: 100vh; 
      position: absolute; inset: 0; 
      background: radial-gradient(circle, #1a0505 0%, #050000 100%); 
      overflow-y: auto; padding: 20px; 
    }
    .screen-layer.active { display: flex; flex-direction: column; align-items: center; }

    /* Эффект старого монитора */
    .crt-overlay::before {
      content: " "; display: block; position: fixed; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
      z-index: 100; background-size: 100% 4px; pointer-events: none;
    }

    /* Меню */
    .menu-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; text-align: center; gap: 15px; width: 100%; max-width: 400px; }
    .menu-title { font-family: 'Bebas Neue'; font-size: clamp(50px, 15vw, 90px); color: #f00; text-shadow: 0 0 20px #f00; line-height: 0.8; margin-bottom: 25px; }
    
    .menu-btn {
      font-family: 'Bebas Neue'; font-size: 26px; background: #200; border: 2px solid #600; color: #f00;
      padding: 15px; width: 100%; transition: 0.2s; text-transform: uppercase; letter-spacing: 2px;
    }
    .menu-btn:not(:disabled):active { transform: scale(0.95); background: #600; color: #fff; }
    .menu-btn:disabled { opacity: 0.2; border-color: #333; color: #444; }

    /* Поле ID */
    .id-card { 
      width: 100%; background: rgba(0,0,0,0.8); border: 1px solid #333; 
      padding: 15px; margin-bottom: 20px; text-align: center; position: relative;
    }
    #roomDisplay { 
      font-family: 'Bebas Neue'; font-size: 36px; color: #0af; 
      cursor: pointer; letter-spacing: 4px; margin: 5px 0;
      text-shadow: 0 0 10px rgba(0,170,255,0.5);
    }
    #copyStatus { font-size: 10px; color: #0f0; opacity: 0; transition: 0.3s; }

    /* Игра */
    .game-content { width: 100%; max-width: 500px; margin: 0 auto; }
    .status-panel { 
      background: rgba(0,0,0,0.9); border: 1px solid #311; padding: 12px; 
      margin-bottom: 15px; font-family: 'Special Elite'; font-size: 14px; 
      color: #844; min-height: 60px; text-align: center; display: flex; align-items: center; justify-content: center;
    }

    .br-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; aspect-ratio: 1/1; margin-bottom: 15px; }
    .br-cell { 
      background: rgba(15,5,5,0.95); border: 1px solid #322; 
      font-size: clamp(8px, 2.8vw, 11px); display: flex; align-items: center; 
      justify-content: center; text-align: center; aspect-ratio: 1/1; padding: 3px;
      color: #554;
    }
    .br-cell.p1-mark { background: #600; color: #fff; text-decoration: line-through; box-shadow: inset 0 0 10px #f00; border-color: #f00; }
    .br-cell.p2-mark { background: #006; color: #fff; text-decoration: line-through; box-shadow: inset 0 0 10px #0af; border-color: #0af; }
    .br-cell.free { color: #f00; border: 1px dashed #f00; font-weight: bold; }

    .controls-row { display: flex; gap: 10px; margin-bottom: 10px; height: 60px; }
    #dieDisplay { 
      width: 80px; background: #000; border: 2px solid #600; 
      display: flex; align-items: center; justify-content: center; 
      font-size: 32px; color: #f00; font-family: 'Bebas Neue';
    }

    /* Оверлей смерти */
    #deathOverlay { 
      display: none; position: fixed; inset: 0; background: #000; 
      z-index: 1000; flex-direction: column; align-items: center; 
      justify-content: center; text-align: center; padding: 20px;
    }
  </style>
</head>
<body class="crt-overlay">

  <div id="screenMenu" class="screen-layer active">
    <div class="menu-container">
      <h1 class="menu-title">DEAD MAN<br><span style="font-size: 0.5em; color: #444;">TERMINAL</span></h1>
      <button class="menu-btn" onclick="startHost()">Создать Лобби</button>
      <button class="menu-btn" onclick="switchScreen('screenBrowse')">Присоединиться</button>
    </div>
  </div>

  <div id="screenBrowse" class="screen-layer">
    <div class="menu-container">
      <h2 style="font-family: 'Bebas Neue'; color: #600;">ВХОД В СИСТЕМУ</h2>
      <input type="text" id="joinInput" placeholder="ВВЕДИТЕ ID..." style="background:#000; border:1px solid #400; color:#0af; padding:15px; width:100%; font-family:inherit; text-align:center; font-size: 20px; margin-bottom:10px;">
      <button class="menu-btn" onclick="joinRoom()">Установить связь</button>
      <button class="menu-btn" style="background:transparent; border:none; color:#444; font-size: 16px;" onclick="switchScreen('screenMenu')">Назад</button>
    </div>
  </div>

  <div id="screenGame" class="screen-layer">
    <div class="game-content">
      <div class="id-card">
        <div style="font-size: 9px; color: #444; letter-spacing: 2px;">ID ТЕРМИНАЛА (НАЖМИ ДЛЯ КОПИРОВАНИЯ)</div>
        <div id="roomDisplay" onclick="copyRoomId()">ОЖИДАНИЕ...</div>
        <div id="copyStatus">СКОПИРОВАНО</div>
      </div>

      <div style="display: flex; justify-content: space-between; font-family: 'Bebas Neue'; font-size: 20px; margin-bottom: 10px;">
        <div id="playerTag" style="color: #444;">ЗАГРУЗКА...</div>
        <div id="turnIndicator" style="color: #f00;">●</div>
      </div>

      <div class="status-panel" id="statusText">ОЖИДАНИЕ ВТОРОГО ПАЦИЕНТА...</div>

      <div class="controls-row">
        <button class="menu-btn" id="triggerBtn" onclick="sendAction('roll')" disabled>СПУСТИТЬ КУРОК</button>
        <div id="dieDisplay">—</div>
      </div>

      <div class="br-grid" id="bingoGrid"></div>
    </div>
  </div>

  <div id="deathOverlay">
    <h1 style="font-family: 'Bebas Neue'; font-size: 15vw; color: #f00;" id="deathTitle">ERASED</h1>
    <p id="deathSub" style="color: #600; font-family: 'Special Elite'; margin-bottom: 40px;">ПРОТОКОЛ ЗАВЕРШЕН</p>
    <button class="menu-btn" onclick="location.reload()" style="max-width: 300px;">В МЕНЮ</button>
  </div>

<script>
let peer, conn;
let myRole = null; 
let isMyTurn = false;
let gameState = {
  marked: Array.from({length:5},()=>Array(5).fill(0)),
  lastRoll: null,
  curP: 1 
};
gameState.marked[2][2] = 3;

const CELLS = [
  ['САДИЗМ','ТРЕВОГА','SELF-HARM','ДИАБЕТ','ОТКАЗ СЕРДЦА'],
  ['ТОКСИЧНОСТЬ','АГРЕССИЯ','ВЫГОРАНИЕ','ИГНОР БОЛИ','ХРОНИКА'],
  ['НАСИЛИЕ','ЗАКОН','★ ОБРЕЧЕН ★','БЕССОНИЦА','ЗАВИСИМОСТЬ'],
  ['ИЗОЛЯЦИЯ','ПЬЯНСТВО','ЖОР','ПАНИКА','ПАРАНОЙЯ'],
  ['НАРКОТИКИ','КУРЕНИЕ','БРЕД','ДОЛГИ','ДЕПРЕССИЯ']
];

function switchScreen(id) {
  document.querySelectorAll('.screen-layer').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function copyRoomId() {
  const id = document.getElementById('roomDisplay').textContent;
  if (id && id !== "ОЖИДАНИЕ...") {
    navigator.clipboard.writeText(id);
    const status = document.getElementById('copyStatus');
    status.style.opacity = "1";
    setTimeout(() => status.style.opacity = "0", 2000);
  }
}

function initPeer(callback) {
  peer = new Peer();
  peer.on('open', (id) => {
    document.getElementById('roomDisplay').textContent = id;
    if (callback) callback(id);
  });

  peer.on('connection', (c) => {
    conn = c;
    setupConn();
    if (myRole === 'host') {
      gameState.curP = Math.random() > 0.5 ? 1 : 2; // Случайный первый ход
      setTimeout(sync, 800);
    }
  });

  peer.on('error', (err) => {
    console.error(err);
    alert("Ошибка связи. Попробуйте еще раз.");
    location.reload();
  });
}

function startHost() {
  myRole = 'host';
  initPeer(() => {
    switchScreen('screenGame');
    document.getElementById('playerTag').textContent = "СУБЪЕКТ 01 (ХОСТ)";
    render();
  });
}

function joinRoom() {
  const id = document.getElementById('joinInput').value.trim();
  if (!id) return;
  myRole = 'guest';
  peer = new Peer();
  peer.on('open', () => {
    conn = peer.connect(id);
    document.getElementById('roomDisplay').textContent = id;
    switchScreen('screenGame');
    document.getElementById('playerTag').textContent = "СУБЪЕКТ 02 (ГОСТЬ)";
    setupConn();
  });
}

function setupConn() {
  conn.on('data', (data) => {
    if (data.type === 'sync') {
      gameState = data.state;
      checkTurn();
      render();
    }
    if (data.type === 'win') showDeath(data.winner);
  });
  conn.on('open', () => updateStatus("СВЯЗЬ УСТАНОВЛЕНА. СИНХРОНИЗАЦИЯ..."));
}

function sync() {
  if (conn && conn.open) conn.send({ type: 'sync', state: gameState });
}

function checkTurn() {
  const myNum = (myRole === 'host' ? 1 : 2);
  isMyTurn = (gameState.curP === myNum);
  
  document.getElementById('triggerBtn').disabled = !isMyTurn || gameState.lastRoll !== null;
  const indicator = document.getElementById('turnIndicator');
  
  if (isMyTurn) {
    indicator.textContent = "ВАШ ХОД";
    indicator.style.color = "#f00";
    updateStatus(gameState.lastRoll ? "ВЫБЕРИТЕ КЛЕТКУ В СТОЛБЦЕ " + (gameState.lastRoll === 6 ? "ПАЛАЧА" : gameState.lastRoll) : "ВАША ОЧЕРЕДЬ ЖАТЬ НА КУРОК.");
  } else {
    indicator.textContent = "ХОД ВРАГА";
    indicator.style.color = "#333";
    updateStatus("ДРУГОЙ ОБЪЕКТ ПРИНИМАЕТ РЕШЕНИЕ...");
  }
  document.getElementById('dieDisplay').textContent = gameState.lastRoll || "—";
}

function sendAction(act, r, c) {
  if (!isMyTurn) return;

  if (act === 'roll') {
    gameState.lastRoll = Math.floor(Math.random() * 6) + 1;
  } else if (act === 'mark') {
    if (!gameState.lastRoll || gameState.marked[r][c] || (r===2 && c===2)) return;
    if (gameState.lastRoll !== 6 && c !== (gameState.lastRoll - 1)) return;
    
    gameState.marked[r][c] = gameState.curP;
    
    if (checkWin()) {
      conn.send({ type: 'win', winner: gameState.curP });
      showDeath(gameState.curP);
      return;
    }
    gameState.curP = (gameState.curP === 1 ? 2 : 1);
    gameState.lastRoll = null;
  }
  checkTurn(); render(); sync();
}

function render() {
  const g = document.getElementById('bingoGrid'); g.innerHTML = '';
  for(let r=0; r<5; r++) {
    for(let c=0; c<5; c++) {
      const div = document.createElement('div');
      div.className = 'br-cell' + (gameState.marked[r][c] === 1 ? ' p1-mark' : gameState.marked[r][c] === 2 ? ' p2-mark' : '') + (r===2 && c===2 ? ' free' : '');
      div.textContent = CELLS[r][c];
      div.onclick = () => sendAction('mark', r, c);
      g.appendChild(div);
    }
  }
}

function updateStatus(msg) { document.getElementById('statusText').textContent = msg; }

function checkWin() {
  const m = gameState.marked;
  const lines = [];
  for(let i=0;i<5;i++) {
    lines.push([[i,0],[i,1],[i,2],[i,3],[i,4]], [[0,i],[1,i],[2,i],[3,i],[4,i]]);
  }
  lines.push([[0,0],[1,1],[2,2],[3,3],[4,4]], [[0,4],[1,3],[2,2],[3,1],[4,0]]);
  return lines.some(line => line.every(([r,c]) => m[r][c] !== 0));
}

function showDeath(winnerNum) {
  const myNum = (myRole === 'host' ? 1 : 2);
  document.getElementById('deathTitle').textContent = (winnerNum === myNum) ? "ВЫ СТЕРТЫ" : "ВЫ ВЫЖИЛИ";
  document.getElementById('deathOverlay').style.display = 'flex';
}
</script>
</body>
</html>
