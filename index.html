<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DEAD MAN BINGO | PROTOCOL ERROR</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

    :root {
      --blood: #8a0303;
      --rust: #3d1a1a;
      --text: #b0a090;
      --neon: #f00;
    }

    * { box-sizing: border-box; cursor: crosshair; user-select: none; -webkit-user-select: none; }
    
    html, body { 
      margin: 0; padding: 0; width: 100%; height: 100%; 
      background: #050000; color: var(--text); 
      font-family: 'Share Tech Mono', monospace; overflow: hidden; 
    }

    /* Фоновые помехи и кровь */
    .noise-bg {
      position: fixed; inset: 0;
      background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'),
                  radial-gradient(circle at center, #1a0505 0%, #000 100%);
      opacity: 0.8; z-index: -1;
    }

    .blood-stain {
      position: fixed; width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(138,3,3,0.2) 0%, transparent 70%);
      filter: blur(40px); pointer-events: none; z-index: -1;
    }

    .crt-overlay::before {
      content: " "; display: block; position: fixed; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
      z-index: 100; background-size: 100% 4px; pointer-events: none;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.9; }
    }

    /* Экраны */
    .screen { display: none; width: 100vw; height: 100vh; position: absolute; inset: 0; padding: 20px; overflow-y: auto; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    /* Меню и кнопки */
    .menu-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; gap: 20px; width: 100%; max-width: 450px; }
    
    .logo { font-family: 'Bebas Neue'; font-size: clamp(60px, 18vw, 110px); color: var(--blood); text-shadow: 0 0 30px var(--blood); line-height: 0.85; text-align: center; margin-bottom: 30px; animation: pulse 2s infinite; }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.02); filter: brightness(1.3); }
    }

    .btn {
      font-family: 'Bebas Neue'; font-size: 28px; background: #1a0000; border: 2px solid var(--blood); color: var(--blood);
      padding: 18px; width: 100%; transition: 0.3s; letter-spacing: 3px; box-shadow: inset 0 0 15px rgba(138,3,3,0.3);
    }
    .btn:hover:not(:disabled) { background: var(--blood); color: #fff; box-shadow: 0 0 25px var(--blood); }
    .btn:disabled { opacity: 0.3; border-color: #333; color: #444; }

    /* Лобби информация */
    .info-box { background: rgba(20,0,0,0.8); border: 1px solid #400; padding: 20px; width: 100%; font-size: 13px; color: #644; line-height: 1.5; border-left: 5px solid var(--blood); }
    .id-display-large { 
      font-family: 'Bebas Neue'; font-size: 40px; color: #0af; cursor: pointer; 
      border: 1px dashed #056; padding: 10px; margin: 15px 0; width: 100%; text-align: center;
      text-shadow: 0 0 15px rgba(0,170,255,0.4);
    }

    /* Сетка Бинго */
    .game-ui { width: 100%; max-width: 550px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; aspect-ratio: 1/1; margin: 20px 0; }
    .cell { 
      background: rgba(10,0,0,0.9); border: 1px solid #311; position: relative;
      font-size: clamp(8px, 2.8vw, 12px); display: flex; align-items: center; 
      justify-content: center; text-align: center; aspect-ratio: 1/1; padding: 4px;
      color: #755; transition: 0.2s;
    }
    .cell.p1 { background: #500; color: #fff; text-decoration: line-through; border-color: #f00; box-shadow: inset 0 0 15px #000; }
    .cell.p2 { background: #004; color: #fff; text-decoration: line-through; border-color: #0af; box-shadow: inset 0 0 15px #000; }
    .cell.free { color: var(--blood); border: 1px dashed var(--blood); font-weight: bold; animation: glow-red 1s infinite; }
    
    @keyframes glow-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .status-bar { height: 60px; background: #000; border: 1px solid #222; display: flex; align-items: center; justify-content: center; font-family: 'Special Elite'; color: #844; padding: 10px; text-align: center; }

    #deathOverlay { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body class="crt-overlay">
  <div class="noise-bg"></div>
  <div class="blood-stain" style="top:-50px; left:-50px;"></div>
  <div class="blood-stain" style="bottom:-50px; right:-50px;"></div>

  <div id="screenMenu" class="screen active">
    <div class="menu-container">
      <div class="logo">DEAD MAN<br>BINGO</div>
      
      <div class="info-box">
        <strong>ПРОТОКОЛ ВЫЖИВАНИЯ:</strong><br>
        1. Создайте канал или введите ID жертвы.<br>
        2. Курок (Roll) определяет колонку (1-5).<br>
        3. Число 6 — выстрел в любую цель.<br>
        4. Пять меток в ряд — конец эксперимента.
      </div>

      <button class="btn" id="btnHost" onclick="startHost()">ГЕНЕРИРОВАТЬ КАНАЛ</button>
      <button class="btn" onclick="switchScreen('screenBrowse')">ПОДКЛЮЧИТЬСЯ</button>
    </div>
  </div>

  <div id="screenBrowse" class="screen">
    <div class="menu-container">
      <h2 style="font-family: 'Bebas Neue'; color: #8a0303; font-size: 40px;">ПОИСК ЖЕРТВЫ</h2>
      <input type="text" id="joinInput" placeholder="КОД ТЕРМИНАЛА..." style="background:#000; border:2px solid #400; color:#0af; padding:20px; width:100%; font-family:inherit; text-align:center; font-size: 24px; outline: none; margin-bottom: 20px;">
      <button class="btn" onclick="joinRoom()">УСТАНОВИТЬ СВЯЗЬ</button>
      <button class="btn" style="border:none; color:#444; font-size: 16px;" onclick="switchScreen('screenMenu')">НАЗАД</button>
    </div>
  </div>

  <div id="screenGame" class="screen">
    <div class="game-ui">
      <div style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div id="playerTag" style="font-family: 'Bebas Neue'; font-size: 22px; color: #444;">ID: LOADING...</div>
        <div id="turnDot" style="color: #f00; font-size: 24px;">●</div>
      </div>
      
      <div id="roomId" class="id-display-large" onclick="copyId()">...</div>
      <div id="copyHint" style="text-align:center; font-size: 10px; color: #0f0; opacity: 0; margin-top: -10px; margin-bottom: 10px;">СКОПИРОВАНО</div>

      <div class="status-bar" id="statusMsg">ОЖИДАНИЕ СИГНАЛА...</div>

      <div style="display: flex; gap: 10px; margin: 15px 0;">
        <button class="btn" id="rollBtn" onclick="gameAction('roll')" disabled>СПУСТИТЬ КУРОК</button>
        <div id="rollRes" style="width: 80px; height: 68px; background: #1a0000; border: 2px solid var(--blood); display: flex; align-items:center; justify-content:center; font-family: 'Bebas Neue'; font-size: 35px; color: #f00;">—</div>
      </div>

      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div id="deathOverlay">
    <div style="color: #f00; font-family: 'Bebas Neue'; font-size: 80px; line-height: 0.8;" id="deathTitle">ERASED</div>
    <div style="color: #444; margin: 20px 0 40px;" id="deathSub">ЛИНИЯ СУДЬБЫ ПРЕРВАНА</div>
    <button class="btn" onclick="location.reload()" style="max-width: 300px;">В МЕНЮ</button>
  </div>

<script>
let peer, conn;
let role = null;
let turn = false;
let state = { board: Array.from({length:5},()=>Array(5).fill(0)), roll: null, activeP: 1 };
state.board[2][2] = 3;

const WORDS = [
  ['САДИЗМ','ТРЕВОГА','SELF-HARM','ДИАБЕТ','ОТКАЗ'],
  ['ЯДЫ','АГРЕССИЯ','ВЫГОРАНИЕ','БОЛЬ','ШРАМЫ'],
  ['МОРГ','ЗАКОН','★ ОБРЕЧЕН ★','БЕССОНИЦА','УЖАС'],
  ['ИЗОЛЯЦИЯ','ПЬЯНСТВО','ЖОР','ПАНИКА','ФОБИЯ'],
  ['ПЫТКИ','ТЛЕН','БРЕД','ДОЛГИ','АГОНИЯ']
];

function switchScreen(s) {
  document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
  document.getElementById(s).classList.add('active');
}

function copyId() {
  const t = document.getElementById('roomId').innerText;
  if(t && t !== '...') {
    navigator.clipboard.writeText(t);
    document.getElementById('copyHint').style.opacity = 1;
    setTimeout(()=> document.getElementById('copyHint').style.opacity = 0, 2000);
  }
}

// Конфигурация для обхода NAT
const CFG = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } };

function initPeer(cb) {
  peer = new Peer(CFG);
  peer.on('open', id => {
    document.getElementById('roomId').innerText = id;
    cb(id);
  });
  peer.on('connection', c => {
    conn = c;
    handleConn();
  });
  peer.on('error', e => { alert("Ошибка: " + e.type); location.reload(); });
}

function startHost() {
  role = 'host';
  document.getElementById('btnHost').disabled = true;
  document.getElementById('btnHost').innerText = "ОЖИДАНИЕ...";
  initPeer(() => {
    switchScreen('screenGame');
    document.getElementById('playerTag').innerText = "ПАЦИЕНТ 01 (ХОСТ)";
    render();
  });
}

function joinRoom() {
  const id = document.getElementById('joinInput').value.trim();
  if(!id) return;
  role = 'guest';
  initPeer(() => {
    conn = peer.connect(id);
    document.getElementById('roomId').innerText = id;
    switchScreen('screenGame');
    document.getElementById('playerTag').innerText = "ПАЦИЕНТ 02 (ГОСТЬ)";
    handleConn();
  });
}

function handleConn() {
  conn.on('open', () => {
    document.getElementById('statusMsg').innerText = "СВЯЗЬ УСТАНОВЛЕНА";
    // Если гость подключился, он сообщает хосту, что готов
    if(role === 'guest') {
      conn.send({ type: 'READY' });
    }
  });

  conn.on('data', data => {
    // ХОСТ получает сигнал готовности и бросает жребий
    if(data.type === 'READY' && role === 'host') {
      state.activeP = Math.random() > 0.5 ? 1 : 2;
      sync();
    }
    // Синхронизация состояния
    if(data.type === 'SYNC') {
      state = data.state;
      update();
    }
    // Победа
    if(data.type === 'WIN') showEnd(data.winner);
  });
}

function sync() {
  if(conn && conn.open) conn.send({ type: 'SYNC', state: state });
  update();
}

function update() {
  const myP = (role === 'host' ? 1 : 2);
  turn = (state.activeP === myP);
  
  document.getElementById('rollBtn').disabled = !turn || state.roll !== null;
  document.getElementById('rollRes').innerText = state.roll || "—";
  document.getElementById('turnDot').style.color = turn ? "#f00" : "#222";
  
  const msg = turn ? (state.roll ? "ВЫБЕРИ СУДЬБУ (КОЛОНКА " + (state.roll==6?"ЛЮБАЯ":state.roll) + ")" : "ВАША ОЧЕРЕДЬ КРУТИТЬ БАРАБАН") : "ОЖИДАЙТЕ ДЕЙСТВИЙ ПРОТИВНИКА...";
  document.getElementById('statusMsg').innerText = msg;
  render();
}

function gameAction(type, r, c) {
  if(!turn) return;

  if(type === 'roll') {
    state.roll = Math.floor(Math.random() * 6) + 1;
  } else if(type === 'mark') {
    if(!state.roll || state.board[r][c] !== 0 || (r===2 && c===2)) return;
    if(state.roll !== 6 && c !== (state.roll-1)) return;

    state.board[r][c] = (role === 'host' ? 1 : 2);
    if(checkWin()) {
      conn.send({ type: 'WIN', winner: state.activeP });
      showEnd(state.activeP);
      return;
    }
    state.activeP = (state.activeP === 1 ? 2 : 1);
    state.roll = null;
  }
  sync();
}

function render() {
  const g = document.getElementById('grid'); g.innerHTML = '';
  for(let r=0; r<5; r++) {
    for(let c=0; c<5; c++) {
      const d = document.createElement('div');
      const val = state.board[r][c];
      d.className = 'cell' + (val===1?' p1':val===2?' p2':val===3?' free':'');
      d.innerText = WORDS[r][c];
      d.onclick = () => gameAction('mark', r, c);
      g.appendChild(d);
    }
  }
}

function checkWin() {
  const b = state.board;
  const winLines = [];
  for(let i=0; i<5; i++) {
    winLines.push([[i,0],[i,1],[i,2],[i,3],[i,4]], [[0,i],[1,i],[2,i],[3,i],[4,i]]);
  }
  winLines.push([[0,0],[1,1],[2,2],[3,3],[4,4]], [[0,4],[1,3],[2,2],[3,1],[4,0]]);
  return winLines.some(l => l.every(([y,x]) => b[y][x] !== 0));
}

function showEnd(w) {
  const myP = (role === 'host' ? 1 : 2);
  document.getElementById('deathTitle').innerText = (w === myP) ? "ВЫ СВОБОДНЫ" : "ВЫ СТЕРТЫ";
  document.getElementById('deathSub').innerText = (w === myP) ? "ОБЪЕКТ УНИЧТОЖЕН. ВЫ ПОКИДАЕТЕ ТЕРМИНАЛ." : "ЛИНИЯ ЖИЗНИ ОБОРВАНА СИСТЕМОЙ.";
  document.getElementById('deathOverlay').style.display = 'flex';
}
</script>
</body>
</html>
