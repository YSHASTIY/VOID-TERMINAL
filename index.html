<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #b0a090;
      font-family: 'Share Tech Mono', monospace;
    }

    * { box-sizing: border-box; cursor: crosshair; }

    .tv-shell {
      width: 100vw;
      height: 100vh;
      background: #050505;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #2a0505 0%, #050000 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 15px solid #1a1a1a;
      box-shadow: inset 0 0 150px rgba(0,0,0,1), 0 0 80px rgba(139,0,0,0.3);
    }

    /* Эффект ЭЛТ-монитора */
    .screen::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
      z-index: 10;
      background-size: 100% 3px, 3px 100%;
      pointer-events: none;
    }

    /* Кровавые потеки */
    .blood-stain {
      position: absolute;
      background: rgba(139, 0, 0, 0.4);
      filter: blur(10px);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }

    .whisper {
      position: absolute;
      font-family: 'Special Elite', cursive;
      font-size: 12px;
      color: rgba(100, 0, 0, 0.5);
      text-transform: uppercase;
      pointer-events: none;
      animation: breathe 4s infinite alternate;
      z-index: 3;
    }

    @keyframes breathe {
      from { opacity: 0.1; transform: scale(0.9); }
      to { opacity: 0.6; transform: scale(1.1); filter: blur(1px); }
    }

    .content-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 2vh 3vw;
      position: relative;
      z-index: 5;
    }

    /* Панель смены языка */
    .lang-panel {
      background: #111;
      border: 2px solid #333;
      padding: 5px 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.8);
    }

    .lang-label { font-size: 10px; color: #555; letter-spacing: 2px; }

    .lang-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      background: #000;
      border: 1px solid #444;
      color: #444;
      padding: 2px 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .lang-btn.active-ru { color: #ff0000; border-color: #800; box-shadow: 0 0 10px #f00; }
    .lang-btn.active-en { color: #00aaff; border-color: #005; box-shadow: 0 0 10px #0af; }

    .player-indicator {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(20px, 4vh, 32px);
      letter-spacing: 4px;
      padding: 5px 20px;
      background: rgba(0,0,0,0.8);
      border-right: 4px solid #f00;
    }
    .p1-active { color: #ff0000; text-shadow: 0 0 20px #f00; }
    .p2-active { color: #0099ff; border-color: #0099ff; text-shadow: 0 0 20px #0099ff; }

    .br-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(45px, 12vh, 120px);
      text-align: center;
      margin: 0;
      color: #600;
      text-shadow: 0 0 30px rgba(255,0,0,0.2);
    }
    .br-title span { color: #ff0000; }

    .br-roll-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      margin: 2vh 0;
    }

    .br-shotgun-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(18px, 3.5vh, 34px);
      background: #400;
      border: 4px solid #800;
      color: #f00;
      padding: 1vh 6vw;
      box-shadow: 0 0 30px rgba(139,0,0,0.5);
    }

    .br-shotgun-btn:active { transform: scale(0.95); filter: brightness(1.5); }

    .br-die-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 60px;
      background: #000;
      border: 2px solid #500;
      width: 12vh; height: 12vh;
      display: flex; align-items: center; justify-content: center;
      color: #ff0000;
      box-shadow: inset 0 0 30px #f00;
    }

    .br-status {
      text-align: center;
      font-family: 'Special Elite', cursive;
      font-size: clamp(14px, 2.5vh, 24px);
      color: #844;
      padding: 1.5vh;
      background: rgba(10,0,0,0.8);
      border-bottom: 1px solid #500;
      margin-bottom: 2vh;
    }

    .br-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(5, 1fr);
      gap: 10px;
    }

    .br-cell {
      background: rgba(15, 5, 5, 0.9);
      border: 1px solid #422;
      font-size: clamp(10px, 1.8vh, 15px);
      color: #554;
      display: flex; align-items: center; justify-content: center;
      text-align: center;
      padding: 5px;
      transition: 0.2s;
    }

    .br-cell.p1-mark { background: #300; border-color: #f00; color: #fff; box-shadow: inset 0 0 15px #f00; text-decoration: line-through; }
    .br-cell.p2-mark { background: #003; border-color: #09f; color: #fff; box-shadow: inset 0 0 15px #09f; text-decoration: line-through; }
    .br-cell.free { background: #000; color: #f00; border: 2px dashed #f00; font-weight: bold; }

    .br-info { display: flex; gap: 30px; margin-top: 2vh; }
    .br-info-block { flex: 1; border-left: 5px solid #800; padding-left: 15px; background: rgba(20,0,0,0.5); }
    .br-info-title { font-family: 'Bebas Neue'; color: #f00; font-size: 18px; }
    .br-info-text { font-size: 13px; color: #666; line-height: 1.4; }

    .br-death-overlay {
      display: none; position: fixed; inset: 0;
      background: #000; z-index: 100;
      flex-direction: column; align-items: center; justify-content: center;
      animation: glitch-bg 0.2s infinite;
    }
    .br-death-overlay.show { display: flex; }
    @keyframes glitch-bg { 0% { background: #000; } 50% { background: #1a0000; } 100% { background: #000; } }

    .br-death-title { font-family: 'Bebas Neue'; font-size: 15vh; color: #f00; text-shadow: 0 0 50px #f00; }
  </style>
</head>
<body>

<div class="tv-shell">
  <div class="screen">
    <div class="blood-stain" style="width: 300px; height: 300px; top: -50px; left: -50px;"></div>
    <div class="blood-stain" style="width: 200px; height: 200px; bottom: 20px; right: -30px;"></div>
    
    <div class="whisper" style="top: 10%; left: 5%;">Every mark is a scar</div>
    <div class="whisper" style="bottom: 15%; right: 8%;">Silence is coming</div>
    <div class="whisper" style="top: 40%; right: 2%;">Don't look back</div>

    <div class="content-wrap">
      <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div id="pIndicator" class="player-indicator p1-active">PLAYER 1 TURN</div>
        
        <div class="lang-panel">
          <span class="lang-label">LOCALE:</span>
          <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
          <button class="lang-btn" id="btnRu" onclick="setLang('ru')">RU</button>
        </div>
      </div>

      <h1 class="br-title">DEAD MAN <span>BINGO</span></h1>

      <div class="br-roll-area">
        <button class="br-shotgun-btn" onclick="rollShell()" id="triggerBtn">PULL TRIGGER</button>
        <div class="br-die-display" id="dieDisplay">—</div>
        <button class="lang-btn" style="border-color: #222; font-size: 12px;" onclick="resetGame()">REBOOT SYSTEM</button>
      </div>

      <div class="br-status" id="statusText"></div>

      <div class="br-grid" id="bingoGrid"></div>

      <div class="br-info">
        <div class="br-info-block">
          <span class="br-info-title" id="modeTitle">THE SWITCHMAN</span>
          <div class="br-info-text" id="modeText">You are the executor. If 6 falls, you decide who bleeds today.</div>
        </div>
        <div class="br-info-block">
          <span class="br-info-title" id="goalTitle">TERMINATION</span>
          <div class="br-info-text" id="goalText">Complete the line to end your cycle. The machine is always hungry.</div>
        </div>
      </div>
    </div>
  </div>

  <div class="br-death-overlay" id="deathOverlay" onclick="resetGame()">
    <div class="br-death-title" id="deathTitle">NULLIFIED</div>
    <div style="font-family: 'Special Elite'; color: #600; margin-top: 30px; letter-spacing: 5px;">THE CYCLE STARTS AGAIN</div>
  </div>
</div>

<script>
const LANGS = {
  en: {
    p1: 'SUBJECT 1 ACTIVE', p2: 'SUBJECT 2 ACTIVE', d1: 'SUBJECT 1 NULLIFIED', d2: 'SUBJECT 2 NULLIFIED',
    roll: (n, c) => 'VOID ROLLED ' + n + '. INJECT IN ' + c, any: '☠ SWITCHMAN! INFECT ANY TARGET.',
    init: 'FEED THE MACHINE. PULL THE TRIGGER.', trigger: 'SPARE NO ONE',
    modeT: 'THE SWITCHMAN', modeX: 'At 6, you become the Hand of Fate. Choose the victim.',
    goalT: 'THE VOID', goalX: 'The line is a grave. Do not be the one to dig it.',
    cells: [
      ['SADISM','IRRITABILITY','SELF-HARM','DIABETES','HEART DISEASE'],
      ['TOXIC RELATIONS','AGGRESSION','BURNOUT','IGNORED PAIN','CHRONIC ILLNESS'],
      ['VIOLENCE','LEGAL CHAOS','★ DOOMED ★','INSOMNIA','DEPENDENCE'],
      ['ISOLATION','ALCOHOLISM','BINGE EATING','PANIC','PARANOIA'],
      ['ADDICTION','HEAVY SMOKING','DELUSIONS','ANXIETY','DEPRESSION']
    ]
  },
  ru: {
    p1: 'ОБЪЕКТ 1 АКТИВЕН', p2: 'ОБЪЕКТ 2 АКТИВЕН', d1: 'ОБЪЕКТ 1 СТЕРТ', d2: 'ОБЪЕКТ 2 СТЕРТ',
    roll: (n, c) => 'БЕЗДНА ВЫДАЛА ' + n + '. МЕТКА В ' + c, any: '☠ СТРЕЛОЧНИК! ВЫБЕРИ СЛЕДУЮЩУЮ ЖЕРТВУ.',
    init: 'МАШИНА ЖАЖДЕТ КРОВИ. ЖМИ.', trigger: 'СПУСТИТЬ КУРОК',
    modeT: 'СТРЕЛОЧНИК', modeX: 'На 6 ты становишься судьей. Выбери, кому нанести удар.',
    goalT: 'ФИНАЛ', goalX: 'Линия — это тупик. Кто завершит её, тот станет частью машины.',
    cells: [
      ['САДИЗМ','ЯРОСТЬ','SELF-HARM','ДИАБЕТ','БОЛЕЗНЬ СЕРДЦА'],
      ['ТОКСИЧНОСТЬ','АГРЕССИЯ','ВЫГОРАНИЕ','ИГНОР БОЛИ','ХРОНИКА'],
      ['НАСИЛИЕ','ЗАКОН','★ ОБРЕЧЕН ★','БЕССОНИЦА','ЗАВИСИМОСТЬ'],
      ['ИЗОЛЯЦИЯ','ПЬЯНСТВО','ЖОР','ПАНИКА','ПАРАНОЙЯ'],
      ['НАРКОТИКИ','КУРЕНИЕ','БРЕД','ТРЕВОГА','ДЕПРЕССИЯ']
    ]
  }
};

let lang = 'ru', curP = 1, marked = Array.from({length:5},()=>Array(5).fill(0)), lastRoll = null, activeCol = -2, over = false;
marked[2][2] = 3;

function setLang(l) { 
  lang = l; 
  document.getElementById('btnEn').className = 'lang-btn' + (l==='en' ? ' active-en' : '');
  document.getElementById('btnRu').className = 'lang-btn' + (l==='ru' ? ' active-ru' : '');
  updateUI(); 
}

function updateUI() {
  const L = LANGS[lang];
  document.getElementById('pIndicator').textContent = curP === 1 ? L.p1 : L.p2;
  document.getElementById('pIndicator').className = 'player-indicator ' + (curP === 1 ? 'p1-active' : 'p2-active');
  document.getElementById('triggerBtn').textContent = L.trigger;
  document.getElementById('modeTitle').textContent = L.modeT;
  document.getElementById('modeText').textContent = L.modeX;
  document.getElementById('goalTitle').textContent = L.goalT;
  document.getElementById('goalText').textContent = L.goalX;
  if(!lastRoll) document.getElementById('statusText').textContent = L.init;
  render();
}

function render() {
  const g = document.getElementById('bingoGrid'); g.innerHTML = '';
  for(let r=0; r<5; r++) {
    for(let c=0; c<5; c++) {
      const div = document.createElement('div');
      div.className = 'br-cell' + (marked[r][c] === 1 ? ' p1-mark' : marked[r][c] === 2 ? ' p2-mark' : '') + (r===2 && c===2 ? ' free' : '');
      div.textContent = LANGS[lang].cells[r][c];
      div.onclick = () => handleCell(r, c);
      g.appendChild(div);
    }
  }
}

function rollShell() {
  if(over || lastRoll) return;
  let count = 0;
  const inv = setInterval(() => {
    document.getElementById('dieDisplay').textContent = Math.floor(Math.random()*6)+1;
    if(++count > 20) {
      clearInterval(inv);
      lastRoll = Math.floor(Math.random()*6)+1;
      document.getElementById('dieDisplay').textContent = lastRoll;
      activeCol = lastRoll === 6 ? -1 : lastRoll - 1;
      document.getElementById('statusText').textContent = lastRoll === 6 ? LANGS[lang].any : LANGS[lang].roll(lastRoll, 'COL ' + lastRoll);
      render();
    }
  }, 40);
}

function handleCell(r, c) {
  if(over || !lastRoll || marked[r][c] || (r===2 && c===2)) return;
  if(lastRoll !== 6 && c !== activeCol) return;
  marked[r][c] = curP;
  if(checkWin()) {
    over = true;
    document.getElementById('deathTitle').textContent = curP === 1 ? LANGS[lang].d1 : LANGS[lang].d2;
    document.getElementById('deathOverlay').classList.add('show');
    return;
  }
  curP = curP === 1 ? 2 : 1;
  lastRoll = null; activeCol = -2;
  document.getElementById('dieDisplay').textContent = '—';
  updateUI();
}

function checkWin() {
  const lines = [];
  for(let i=0; i<5; i++) { lines.push([[i,0],[i,1],[i,2],[i,3],[i,4]]); lines.push([[0,i],[1,i],[2,i],[3,i],[4,i]]); }
  lines.push([[0,0],[1,1],[2,2],[3,3],[4,4]], [[0,4],[1,3],[2,2],[3,1],[4,0]]);
  return lines.some(line => line.every(([r,c]) => marked[r][c] !== 0));
}

function resetGame() {
  marked = Array.from({length:5},()=>Array(5).fill(0)); marked[2][2] = 3;
  curP = 1; lastRoll = null; activeCol = -2; over = false;
  document.getElementById('deathOverlay').classList.remove('show');
  document.getElementById('dieDisplay').textContent = '—';
  updateUI();
}

setLang('ru');
</script>
</body>
</html>
