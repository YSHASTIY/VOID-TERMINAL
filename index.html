<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DEAD MAN BINGO | PROTOCOL РФ-STABLE</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

    :root { --blood: #8a0303; --text: #b0a090; --neon: #0af; }
    * { box-sizing: border-box; cursor: crosshair; user-select: none; -webkit-user-select: none; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #050000; color: var(--text); font-family: 'Share Tech Mono', monospace; overflow: hidden; }

    .crt-overlay::before {
      content: " "; display: block; position: fixed; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
      z-index: 100; background-size: 100% 4px; pointer-events: none;
    }

    .screen { display: none; width: 100vw; height: 100vh; position: absolute; inset: 0; padding: 20px; overflow-y: auto; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    .menu-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; gap: 15px; width: 100%; max-width: 450px; }
    .logo { font-family: 'Bebas Neue'; font-size: clamp(60px, 15vw, 100px); color: var(--blood); text-shadow: 0 0 20px var(--blood); text-align: center; margin-bottom: 20px; line-height: 0.9; }
    
    .btn {
      font-family: 'Bebas Neue'; font-size: 26px; background: #1a0000; border: 2px solid var(--blood); color: var(--blood);
      padding: 15px; width: 100%; transition: 0.3s; letter-spacing: 2px; outline: none;
    }
    .btn:hover:not(:disabled) { background: var(--blood); color: #fff; }
    .btn:disabled { opacity: 0.2; }

    .id-box { 
      font-family: 'Bebas Neue'; font-size: 24px; color: var(--neon); border: 1px dashed #056; 
      padding: 10px; margin: 10px 0; width: 100%; text-align: center; word-break: break-all;
    }

    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; max-width: 500px; aspect-ratio: 1/1; margin: 15px 0; }
    .cell { 
      background: rgba(15,0,0,0.9); border: 1px solid #311; font-size: clamp(8px, 2.5vw, 11px);
      display: flex; align-items: center; justify-content: center; text-align: center; aspect-ratio: 1/1; padding: 3px; color: #654;
    }
    .cell.p1 { background: #600; color: #fff; text-decoration: line-through; }
    .cell.p2 { background: #004; color: #fff; text-decoration: line-through; }
    .cell.free { color: var(--blood); font-weight: bold; border: 1px dashed var(--blood); }

    .status-bar { width: 100%; max-width: 500px; background: #000; border: 1px solid #222; padding: 10px; text-align: center; font-size: 14px; min-height: 50px; color: #844; font-family: 'Special Elite'; }
    #rollVal { width: 60px; height: 50px; border: 2px solid var(--blood); display: flex; align-items: center; justify-content: center; font-size: 30px; font-family: 'Bebas Neue'; color: #f00; }
  </style>
</head>
<body class="crt-overlay">

  <div id="screenMenu" class="screen active">
    <div class="menu-container">
      <div class="logo">DEAD MAN<br>BINGO</div>
      <button class="btn" id="hostStart" onclick="startSession('host')">СОЗДАТЬ КАНАЛ</button>
      <button class="btn" onclick="switchScreen('screenJoin')">ПОДКЛЮЧИТЬСЯ</button>
    </div>
  </div>

  <div id="screenJoin" class="screen">
    <div class="menu-container">
      <h2 style="font-family:'Bebas Neue'; color:var(--blood)">ВВОД ID</h2>
      <input type="text" id="targetId" placeholder="ID ТЕРМИНАЛА..." style="background:#000; border:1px solid #400; color:var(--neon); padding:15px; width:100%; text-align:center; font-family:inherit; margin-bottom:15px;">
      <button class="btn" onclick="startSession('guest')">УСТАНОВИТЬ СВЯЗЬ</button>
      <button class="btn" style="border:none; color:#444" onclick="switchScreen('screenMenu')">НАЗАД</button>
    </div>
  </div>

  <div id="screenGame" class="screen">
    <div style="width:100%; max-width:500px">
      <div id="playerInfo" style="font-family:'Bebas Neue'; font-size:18px; color:#444">ОЖИДАНИЕ...</div>
      <div id="displayId" class="id-box" onclick="copyId()">ГЕНЕРАЦИЯ...</div>
      <div class="status-bar" id="statusMsg">СИСТЕМА ГОТОВА</div>
      
      <div style="display:flex; gap:10px; margin:15px 0">
        <button class="btn" id="rollBtn" onclick="gameAction('roll')" disabled>КУРОК</button>
        <div id="rollVal">—</div>
      </div>
      
      <div class="grid" id="mainGrid"></div>
    </div>
  </div>

<script>
let peer, conn, myRole;
let isMyTurn = false;
let state = { board: Array.from({length:5},()=>Array(5).fill(0)), roll: null, curP: 1 };
state.board[2][2] = 3;

const WORDS = [
  ['САДИЗМ','ТРЕВОГА','SELF-HARM','ДИАБЕТ','ОТКАЗ'],
  ['ЯДЫ','АГРЕССИЯ','ВЫГОРАНИЕ','БОЛЬ','ШРАМЫ'],
  ['МОРГ','ЗАКОН','★ ОБРЕЧЕН ★','БЕССОНИЦА','УЖАС'],
  ['ИЗОЛЯЦИЯ','ПЬЯНСТВО','ЖОР','ПАНИКА','ФОБИЯ'],
  ['ПЫТКИ','ТЛЕН','БРЕД','ДОЛГИ','АГОНИЯ']
];

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function copyId() {
  const el = document.getElementById('displayId');
  navigator.clipboard.writeText(el.innerText);
  el.style.color = '#0f0'; setTimeout(()=>el.style.color='#0af', 500);
}

function startSession(type) {
  myRole = type;
  if(type === 'host') document.getElementById('hostStart').disabled = true;
  
  // КЛЮЧЕВОЕ: Использование Google STUN для обхода блокировок в РФ
  peer = new Peer({
    config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] }
  });

  peer.on('open', id => {
    document.getElementById('displayId').innerText = id;
    if(type === 'guest') {
      const tid = document.getElementById('targetId').value.trim();
      conn = peer.connect(tid);
      setupConn();
    }
    switchScreen('screenGame');
    document.getElementById('playerInfo').innerText = type === 'host' ? "СУБЪЕКТ 01 (HOST)" : "СУБЪЕКТ 02 (GUEST)";
    render();
  });

  peer.on('connection', c => {
    conn = c;
    setupConn();
    if(myRole === 'host') {
      state.curP = Math.random() > 0.5 ? 1 : 2;
      setTimeout(sync, 500);
    }
  });

  peer.on('error', e => { alert("ОШИБКА: " + e.type); location.reload(); });
}

function setupConn() {
  conn.on('data', data => {
    if(data.type === 'sync') {
      state = data.state;
      updateUI();
    }
  });
  conn.on('open', () => {
    document.getElementById('statusMsg').innerText = "КАНАЛ УСТАНОВЛЕН";
    if(myRole === 'guest') conn.send({type: 'ready'});
  });
}

function sync() {
  if(conn && conn.open) conn.send({ type: 'sync', state: state });
  updateUI();
}

function updateUI() {
  const pNum = myRole === 'host' ? 1 : 2;
  isMyTurn = (state.curP === pNum);
  document.getElementById('rollBtn').disabled = !isMyTurn || state.roll !== null;
  document.getElementById('rollVal').innerText = state.roll || "—";
  
  let msg = isMyTurn ? "ВАШ ХОД. " : "ЖДИТЕ ПРИГОВОРА... ";
  if(isMyTurn && state.roll) msg += (state.roll === 6 ? "ВЫСТРЕЛ В ЛЮБУЮ ЦЕЛЬ" : "СТОЛБЕЦ " + state.roll);
  document.getElementById('statusMsg').innerText = msg;
  render();
}

function gameAction(type, r, c) {
  if(!isMyTurn) return;
  if(type === 'roll') {
    state.roll = Math.floor(Math.random() * 6) + 1;
  } else {
    if(!state.roll || state.board[r][c] !== 0 || (r===2 && c===2)) return;
    if(state.roll !== 6 && c !== (state.roll-1)) return;
    state.board[r][c] = state.curP;
    state.curP = state.curP === 1 ? 2 : 1;
    state.roll = null;
  }
  sync();
}

function render() {
  const g = document.getElementById('mainGrid');
  g.innerHTML = '';
  for(let r=0; r<5; r++) {
    for(let c=0; c<5; c++) {
      const d = document.createElement('div');
      const v = state.board[r][c];
      d.className = 'cell' + (v===1?' p1':v===2?' p2':v===3?' free':'');
      d.innerText = WORDS[r][c];
      d.onclick = () => gameAction('mark', r, c);
      g.appendChild(d);
    }
  }
}
</script>
</body>
</html>
