<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DEAD MAN BINGO | TERMINAL</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

    :root { --blood: #8a0303; --neon: #0af; --text: #b0a090; }

    * { box-sizing: border-box; cursor: crosshair; user-select: none; -webkit-user-select: none; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #050000; color: var(--text); font-family: 'Share Tech Mono', monospace; overflow: hidden; }

    /* CRT & Blood Effects */
    .crt::before {
      content: " "; display: block; position: fixed; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
      z-index: 100; background-size: 100% 4px; pointer-events: none; animation: flicker 0.15s infinite;
    }
    @keyframes flicker { 0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

    .screen { display: none; width: 100vw; height: 100vh; position: absolute; inset: 0; padding: 20px; flex-direction: column; align-items: center; overflow-y: auto; }
    .screen.active { display: flex; }

    .menu-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; gap: 15px; width: 100%; max-width: 450px; text-align: center; }
    .logo { font-family: 'Bebas Neue'; font-size: clamp(60px, 15vw, 100px); color: var(--blood); text-shadow: 0 0 25px var(--blood); line-height: 0.8; margin-bottom: 20px; }
    
    .btn {
      font-family: 'Bebas Neue'; font-size: 24px; background: #1a0000; border: 2px solid var(--blood); color: var(--blood);
      padding: 15px; width: 100%; transition: 0.3s; letter-spacing: 2px; outline: none; box-shadow: inset 0 0 10px rgba(138,3,3,0.3);
    }
    .btn:hover:not(:disabled) { background: var(--blood); color: #fff; box-shadow: 0 0 20px var(--blood); }
    .btn:disabled { opacity: 0.2; filter: grayscale(1); }

    .id-display { font-family: 'Bebas Neue'; font-size: 28px; color: var(--neon); border: 1px dashed #056; padding: 10px; width: 100%; margin: 10px 0; background: rgba(0,0,0,0.5); }

    /* Game UI */
    .game-box { width: 100%; max-width: 500px; }
    .status-bar { background: #000; border: 1px solid #311; padding: 10px; margin: 10px 0; font-family: 'Special Elite'; font-size: 14px; color: #844; min-height: 50px; display: flex; align-items: center; justify-content: center; text-align: center; }
    
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; aspect-ratio: 1/1; margin-bottom: 20px; }
    .cell { 
      background: rgba(15,0,0,0.95); border: 1px solid #211; font-size: clamp(8px, 2.5vw, 11px);
      display: flex; align-items: center; justify-content: center; text-align: center; aspect-ratio: 1/1; padding: 4px; color: #654;
    }
    .cell.p1 { background: #700; color: #fff; text-decoration: line-through; box-shadow: inset 0 0 15px #000; }
    .cell.p2 { background: #005; color: #fff; text-decoration: line-through; box-shadow: inset 0 0 15px #000; }
    .cell.free { color: var(--blood); border: 1px dashed var(--blood); font-weight: bold; }

    #rollRes { width: 70px; height: 58px; background: #000; border: 2px solid var(--blood); color: #f00; font-family: 'Bebas Neue'; font-size: 32px; display: flex; align-items: center; justify-content: center; }

    #deathOverlay { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body class="crt">

  <div id="scrMenu" class="screen active">
    <div class="menu-container">
      <div class="logo">DEAD MAN<br>BINGO</div>
      <button class="btn" id="hostBtn" onclick="initSession('host')">СОЗДАТЬ КАНАЛ</button>
      <button class="btn" onclick="switchScreen('scrJoin')">ПОДКЛЮЧИТЬСЯ</button>
    </div>
  </div>

  <div id="scrJoin" class="screen">
    <div class="menu-container">
      <h2 style="font-family:'Bebas Neue'; color:var(--blood)">ВХОД В СИСТЕМУ</h2>
      <input type="text" id="joinInput" placeholder="ID ТЕРМИНАЛА..." style="background:#000; border:1px solid #400; color:var(--neon); padding:15px; width:100%; text-align:center; font-family:inherit; font-size:20px; outline:none; margin-bottom:15px;">
      <button class="btn" onclick="initSession('guest')">УСТАНОВИТЬ СВЯЗЬ</button>
      <button class="btn" style="border:none; color:#444" onclick="switchScreen('scrMenu')">ОТМЕНА</button>
    </div>
  </div>

  <div id="scrGame" class="screen">
    <div class="game-box">
      <div style="display:flex; justify-content:space-between; font-family:'Bebas Neue'; color:#444; margin-bottom:5px;">
        <span id="playerRole">ИНИЦИАЛИЗАЦИЯ...</span>
        <span id="turnDot">●</span>
      </div>
      <div id="roomIdDisplay" class="id-display" onclick="copyId()">ГЕНЕРАЦИЯ...</div>
      <div class="status-bar" id="statusMsg">ОЖИДАНИЕ ОБЪЕКТА...</div>
      
      <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button class="btn" id="rollBtn" onclick="doAction('roll')" disabled>СПУСТИТЬ КУРОК</button>
        <div id="rollRes">—</div>
      </div>
      
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div id="deathOverlay">
    <h1 id="deathTitle" style="font-family:'Bebas Neue'; font-size:15vw; color:var(--blood); margin:0;">ERASED</h1>
    <button class="btn" onclick="location.reload()" style="max-width:300px; margin-top:30px;">ВЕРНУТЬСЯ</button>
  </div>

<script>
let peer, conn, myRole;
let state = { board: Array.from({length:5},()=>Array(5).fill(0)), roll: null, turn: 1 };
state.board[2][2] = 3; // FREE SPACE

const WORDS = [
  ['САДИЗМ','ТРЕВОГА','SELF-HARM','ДИАБЕТ','ОТКАЗ'],
  ['ЯДЫ','АГРЕССИЯ','ВЫГОРАНИЕ','БОЛЬ','ШРАМЫ'],
  ['МОРГ','ЗАКОН','★ ОБРЕЧЕН ★','БЕССОНИЦА','УЖАС'],
  ['ИЗОЛЯЦИЯ','ПЬЯНСТВО','ЖОР','ПАНИКА','ФОБИЯ'],
  ['ПЫТКИ','ТЛЕН','БРЕД','ДОЛГИ','АГОНИЯ']
];

function switchScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function copyId() {
  const txt = document.getElementById('roomIdDisplay').innerText;
  if(txt.includes('...')) return;
  navigator.clipboard.writeText(txt);
  document.getElementById('statusMsg').innerText = "ID СКОПИРОВАН В БУФЕР";
}

function initSession(type) {
  myRole = type;
  if(type === 'host') document.getElementById('hostBtn').disabled = true;

  // Конфигурация для РФ (STUN Google + OpenRelay)
  peer = new Peer({
    config: { 'iceServers': [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun.anyfirewall.com:3478' }
    ] }
  });

  peer.on('open', id => {
    document.getElementById('roomIdDisplay').innerText = id;
    if(type === 'guest') {
      const target = document.getElementById('joinInput').value.trim();
      conn = peer.connect(target, { reliable: true });
      setupConn();
    }
    switchScreen('scrGame');
    document.getElementById('playerRole').innerText = type === 'host' ? "ПАЦИЕНТ 01 (HOST)" : "ПАЦИЕНТ 02 (GUEST)";
    render();
  });

  peer.on('connection', c => {
    conn = c;
    setupConn();
    if(myRole === 'host') {
      state.turn = Math.random() > 0.5 ? 1 : 2;
      setTimeout(sync, 1000);
    }
  });

  peer.on('error', e => { 
    alert("Критический сбой: " + e.type + ". Попробуйте обновить страницу."); 
    location.reload(); 
  });
}

function setupConn() {
  conn.on('open', () => {
    document.getElementById('statusMsg').innerText = "КАНАЛ СТАБИЛЕН. СИНХРОНИЗАЦИЯ...";
    if(myRole === 'guest') conn.send({type: 'READY'});
  });

  conn.on('data', data => {
    if(data.type === 'SYNC') {
      state = data.state;
      update();
    }
    if(data.type === 'WIN') showWin(data.winner);
  });
}

function sync() {
  if(conn && conn.open) conn.send({ type: 'SYNC', state: state });
  update();
}

function update() {
  const myNum = (myRole === 'host' ? 1 : 2);
  const isMyTurn = (state.turn === myNum);
  
  document.getElementById('rollBtn').disabled = !isMyTurn || state.roll !== null;
  document.getElementById('rollRes').innerText = state.roll || "—";
  document.getElementById('turnDot').style.color = isMyTurn ? "#f00" : "#222";
  
  let m = isMyTurn ? "ВАША ОЧЕРЕДЬ. " : "ОЖИДАНИЕ ДЕЙСТВИЙ ВРАГА... ";
  if(isMyTurn && state.roll) m += (state.roll === 6 ? "ВЫБЕРИТЕ ЛЮБУЮ КЛЕТКУ" : "ВАШ СТОЛБЕЦ: " + state.roll);
  document.getElementById('statusMsg').innerText = m;
  render();
}

function doAction(type, r, c) {
  const myNum = (myRole === 'host' ? 1 : 2);
  if(state.turn !== myNum) return;

  if(type === 'roll') {
    state.roll = Math.floor(Math.random() * 6) + 1;
  } else if(type === 'mark') {
    if(!state.roll || state.board[r][c] !== 0 || (r===2 && c===2)) return;
    if(state.roll !== 6 && c !== (state.roll - 1)) return;
    
    state.board[r][c] = myNum;
    if(checkWin()) {
      conn.send({ type: 'WIN', winner: myNum });
      showWin(myNum);
      return;
    }
    state.turn = (myNum === 1 ? 2 : 1);
    state.roll = null;
  }
  sync();
}

function render() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  for(let r=0; r<5; r++) {
    for(let c=0; c<5; c++) {
      const d = document.createElement('div');
      const v = state.board[r][c];
      d.className = 'cell' + (v===1?' p1':v===2?' p2':v===3?' free':'');
      d.innerText = WORDS[r][c];
      d.onclick = () => doAction('mark', r, c);
      g.appendChild(d);
    }
  }
}

function checkWin() {
  const b = state.board;
  const lines = [];
  for(let i=0; i<5; i++) {
    lines.push([[i,0],[i,1],[i,2],[i,3],[i,4]], [[0,i],[1,i],[2,i],[3,i],[4,i]]);
  }
  lines.push([[0,0],[1,1],[2,2],[3,3],[4,4]], [[0,4],[1,3],[2,2],[3,1],[4,0]]);
  return lines.some(l => l.every(([y,x]) => b[y][x] !== 0));
}

function showWin(w) {
  const myNum = (myRole === 'host' ? 1 : 2);
  document.getElementById('deathTitle').innerText = (w === myNum) ? "ВЫЖИЛ" : "СТЕРТ";
  document.getElementById('deathTitle').style.color = (w === myNum) ? "#0af" : "#8a0303";
  document.getElementById('deathOverlay').style.display = 'flex';
}
</script>
</body>
</html>
