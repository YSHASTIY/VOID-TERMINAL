<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DEAD MAN BINGO | PROTOCOL ONLINE</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; cursor: crosshair; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
    
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #b0a090; font-family: 'Share Tech Mono', monospace; overflow: hidden; }

    .screen-layer { display: none; width: 100vw; height: 100vh; position: absolute; inset: 0; background: radial-gradient(circle, #1a0505 0%, #050000 100%); overflow-y: auto; padding: 20px; }
    .screen-layer.active { display: flex; flex-direction: column; align-items: center; }

    .crt-overlay::before {
      content: " "; display: block; position: fixed; inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
      z-index: 100; background-size: 100% 4px; pointer-events: none;
    }

    .menu-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100%; text-align: center; gap: 15px; width: 100%; max-width: 400px; }
    .menu-title { font-family: 'Bebas Neue'; font-size: clamp(50px, 15vw, 100px); color: #f00; text-shadow: 0 0 20px #f00; line-height: 0.9; margin-bottom: 20px; }
    .menu-btn {
      font-family: 'Bebas Neue'; font-size: 24px; background: #200; border: 2px solid #600; color: #f00;
      padding: 12px; width: 100%; transition: 0.3s;
    }
    .menu-btn:active { transform: scale(0.95); background: #600; color: #fff; }

    .lobby-box { width: 100%; background: rgba(20,0,0,0.8); border: 1px solid #400; padding: 20px; margin-top: 10px; }
    .room-id-display { color: #0af; font-weight: bold; border: 1px dashed #0af; padding: 10px; margin: 10px 0; word-break: break-all; }

    /* Игра */
    .game-content { width: 100%; max-width: 500px; }
    .br-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; aspect-ratio: 1/1; margin: 10px 0; }
    .br-cell { background: rgba(15,5,5,0.9); border: 1px solid #322; font-size: clamp(8px, 2.5vw, 11px); display: flex; align-items: center; justify-content: center; text-align: center; aspect-ratio: 1/1; padding: 2px; }
    .br-cell.p1-mark { background: #600; color: #fff; text-decoration: line-through; box-shadow: inset 0 0 10px #f00; }
    .br-cell.p2-mark { background: #006; color: #fff; text-decoration: line-through; box-shadow: inset 0 0 10px #0af; }
    .br-cell.free { color: #f00; border: 1px dashed #f00; font-weight: bold; }

    .status-panel { background: #000; padding: 10px; border: 1px solid #333; margin-bottom: 10px; font-family: 'Special Elite'; font-size: 13px; color: #844; min-height: 50px; text-align: center; }
    
    #deathOverlay { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
  </style>
</head>
<body class="crt-overlay">

  <div id="screenMenu" class="screen-layer active">
    <div class="menu-container">
      <h1 class="menu-title">DEAD MAN<br><span style="color:#444; font-size:0.5em">MULTIPLAYER</span></h1>
      <button class="menu-btn" onclick="startHost()">СОЗДАТЬ ЛОББИ</button>
      <button class="menu-btn" onclick="switchScreen('screenBrowse')">ПРИСОЕДИНИТЬСЯ</button>
      <div style="font-size: 10px; color: #333; margin-top: 20px;">v.2.1 | P2P_PROTOCOL_ENABLED</div>
    </div>
  </div>

  <div id="screenBrowse" class="screen-layer">
    <div class="menu-container">
      <h2 style="font-family: 'Bebas Neue'; color:#600">ВХОД В ТЕРМИНАЛ</h2>
      <div class="lobby-box">
        <input type="text" id="joinInput" placeholder="ВВЕДИТЕ ID..." style="background:#000; border:1px solid #400; color:#0af; padding:12px; width:100%; font-family:inherit; text-align:center; margin-bottom:10px;">
        <button class="menu-btn" onclick="joinRoom()">УСТАНОВИТЬ СВЯЗЬ</button>
      </div>
      <button class="menu-btn" style="background:transparent; border-color:#222; color:#444" onclick="switchScreen('screenMenu')">ОТМЕНА</button>
    </div>
  </div>

  <div id="screenGame" class="screen-layer">
    <div class="game-content">
      <div style="display: flex; justify-content: space-between; font-family: 'Bebas Neue'; font-size: 18px; margin-bottom: 5px;">
        <div id="playerTag" style="color: #444;">ПОДКЛЮЧЕНИЕ...</div>
        <div id="roomDisplay" style="color: #222; font-size: 12px;">ID: -</div>
      </div>

      <div class="status-panel" id="statusText">ОЖИДАНИЕ ВТОРОГО СУБЪЕКТА...</div>

      <div style="display: flex; gap: 8px; margin-bottom: 10px;">
        <button class="menu-btn" id="triggerBtn" onclick="sendAction('roll')" disabled>СПУСТИТЬ КУРОК</button>
        <div id="dieDisplay" style="width: 60px; height: 52px; background: #000; border: 1px solid #600; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #f00; font-family: 'Bebas Neue';">?</div>
      </div>

      <div class="br-grid" id="bingoGrid"></div>
    </div>
  </div>

  <div id="deathOverlay">
    <h1 style="font-family: 'Bebas Neue'; font-size: 12vw; color: #f00;" id="deathTitle">ERASED</h1>
    <p id="deathSub" style="color: #600; font-family: 'Special Elite'; margin-bottom: 30px;">ЛИНИЯ ЗАМКНУЛАСЬ</p>
    <button class="menu-btn" onclick="location.reload()" style="max-width: 300px;">ВЕРНУТЬСЯ В МЕНЮ</button>
  </div>

<script>
let peer, conn;
let myRole = null; 
let isMyTurn = false;
let gameState = {
  marked: Array.from({length:5},()=>Array(5).fill(0)),
  lastRoll: null,
  curP: 1 
};
gameState.marked[2][2] = 3;

const CELLS = [
  ['САДИЗМ','ТРЕВОГА','SELF-HARM','ДИАБЕТ','ОТКАЗ СЕРДЦА'],
  ['ТОКСИЧНОСТЬ','АГРЕССИЯ','ВЫГОРАНИЕ','ИГНОР БОЛИ','ХРОНИКА'],
  ['НАСИЛИЕ','ЗАКОН','★ ОБРЕЧЕН ★','БЕССОНИЦА','ЗАВИСИМОСТЬ'],
  ['ИЗОЛЯЦИЯ','ПЬЯНСТВО','ЖОР','ПАНИКА','ПАРАНОЙЯ'],
  ['НАРКОТИКИ','КУРЕНИЕ','БРЕД','ДОЛГИ','ДЕПРЕССИЯ']
];

function switchScreen(id) {
  document.querySelectorAll('.screen-layer').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function initPeer() {
  peer = new Peer();
  peer.on('open', (id) => {
    document.getElementById('roomDisplay').textContent = "ID: " + id;
    if (myRole === 'host') {
      alert("КОД ЛОББИ: " + id + "\nОтправьте его второму игроку.");
    }
  });

  peer.on('connection', (c) => {
    conn = c;
    if (myRole === 'host') {
      // РАНДОМ ПЕРВОГО ХОДА
      gameState.curP = Math.random() > 0.5 ? 1 : 2;
      setupConn();
      setTimeout(() => { sync(); }, 500); // Даем время на установку связи
    } else {
      setupConn();
    }
  });
}

function startHost() {
  myRole = 'host';
  switchScreen('screenGame');
  document.getElementById('playerTag').textContent = "ПАЦИЕНТ 1 (КРАСНЫЙ)";
  initPeer();
  render();
}

function joinRoom() {
  const id = document.getElementById('joinInput').value;
  if (!id) return;
  myRole = 'guest';
  peer = new Peer();
  peer.on('open', () => {
    conn = peer.connect(id);
    switchScreen('screenGame');
    document.getElementById('playerTag').textContent = "ПАЦИЕНТ 2 (СИНИЙ)";
    setupConn();
  });
}

function setupConn() {
  conn.on('data', (data) => {
    if (data.type === 'sync') {
      gameState = data.state;
      checkTurn();
      render();
    }
    if (data.type === 'win') showDeath(data.winner);
  });
  
  conn.on('open', () => {
    updateStatus("СВЯЗЬ УСТАНОВЛЕНА. ОПРЕДЕЛЕНИЕ ОЧЕРЕДНОСТИ...");
  });
}

function sync() {
  if (conn) conn.send({ type: 'sync', state: gameState });
}

function checkTurn() {
  const myNum = (myRole === 'host' ? 1 : 2);
  isMyTurn = (gameState.curP === myNum);
  
  document.getElementById('triggerBtn').disabled = !isMyTurn || gameState.lastRoll !== null;
  
  if (isMyTurn) {
    document.getElementById('playerTag').style.color = (myNum === 1 ? "#f00" : "#0af");
    updateStatus(gameState.lastRoll ? "ВЫБЕРИТЕ КЛЕТКУ В СТОЛБЦЕ " + (gameState.lastRoll === 6 ? "ПАЛАЧА" : gameState.lastRoll) : "ВАШ ХОД. ЖМИТЕ НА КУРОК.");
  } else {
    document.getElementById('playerTag').style.color = "#222";
    updateStatus("ХОДИТ ДРУГОЙ СУБЪЕКТ...");
  }
  
  document.getElementById('dieDisplay').textContent = gameState.lastRoll || "—";
}

function sendAction(act, r, c) {
  if (!isMyTurn) return;

  if (act === 'roll') {
    gameState.lastRoll = Math.floor(Math.random() * 6) + 1;
  } else if (act === 'mark') {
    if (!gameState.lastRoll || gameState.marked[r][c] || (r===2 && c===2)) return;
    if (gameState.lastRoll !== 6 && c !== (gameState.lastRoll - 1)) return;
    
    gameState.marked[r][c] = gameState.curP;
    
    if (checkWin()) {
      conn.send({ type: 'win', winner: gameState.curP });
      showDeath(gameState.curP);
      return;
    }

    gameState.curP = (gameState.curP === 1 ? 2 : 1);
    gameState.lastRoll = null;
  }

  checkTurn();
  render();
  sync();
}

function render() {
  const g = document.getElementById('bingoGrid'); g.innerHTML = '';
  for(let r=0; r<5; r++) {
    for(let c=0; c<5; c++) {
      const div = document.createElement('div');
      div.className = 'br-cell' + (gameState.marked[r][c] === 1 ? ' p1-mark' : gameState.marked[r][c] === 2 ? ' p2-mark' : '') + (r===2 && c===2 ? ' free' : '');
      div.textContent = CELLS[r][c];
      div.onclick = () => sendAction('mark', r, c);
      g.appendChild(div);
    }
  }
}

function updateStatus(msg) {
  document.getElementById('statusText').textContent = msg;
}

function checkWin() {
  const m = gameState.marked;
  const lines = [];
  for(let i=0;i<5;i++) {
    lines.push([[i,0],[i,1],[i,2],[i,3],[i,4]], [[0,i],[1,i],[2,i],[3,i],[4,i]]);
  }
  lines.push([[0,0],[1,1],[2,2],[3,3],[4,4]], [[0,4],[1,3],[2,2],[3,1],[4,0]]);
  return lines.some(line => line.every(([r,c]) => m[r][c] !== 0));
}

function showDeath(winnerNum) {
  const myNum = (myRole === 'host' ? 1 : 2);
  document.getElementById('deathTitle').textContent = (winnerNum === myNum) ? "ВЫ ПРОИГРАЛИ" : "ВЫ ВЫЖИЛИ";
  document.getElementById('deathSub').textContent = (winnerNum === myNum) ? "СИСТЕМА СТЕРЛА ВАШИ ДАННЫЕ" : "ОБЪЕКТ ПЕРЕД ВАМИ ПАЛ";
  document.getElementById('deathOverlay').style.display = 'flex';
}
</script>
</body>
</html>
