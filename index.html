<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TERMINAL | STABLE-LINK</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');
        :root { --blood: #8a0303; --neon: #0af; }
        * { box-sizing: border-box; cursor: crosshair; }
        body { margin: 0; background: #050000; color: #b0a090; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
        
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .screen.active { display: flex; }
        
        .logo { font-family: 'Bebas Neue'; font-size: 80px; color: var(--blood); text-shadow: 0 0 20px var(--blood); text-align: center; line-height: 0.8; margin-bottom: 30px; }
        
        .btn {
            font-family: 'Bebas Neue'; font-size: 24px; background: #1a0000; border: 2px solid var(--blood); color: var(--blood);
            padding: 15px; width: 100%; max-width: 300px; margin: 10px; transition: 0.3s; letter-spacing: 2px;
        }
        .btn:hover:not(:disabled) { background: var(--blood); color: #fff; }
        .btn:disabled { opacity: 0.2; }

        .status-box { background: rgba(20,0,0,0.8); border: 1px solid #400; padding: 15px; width: 100%; max-width: 400px; text-align: center; color: #844; margin-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; max-width: 400px; aspect-ratio: 1/1; }
        .cell { 
            background: #0a0000; border: 1px solid #311; aspect-ratio: 1/1; 
            display: flex; align-items: center; justify-content: center; font-size: 9px; text-align: center;
        }
        .cell.p1 { background: #800; color: #fff; box-shadow: inset 0 0 10px #000; }
        .cell.p2 { background: #006; color: #fff; box-shadow: inset 0 0 10px #000; }
        .cell.free { border: 1px dashed var(--blood); color: var(--blood); font-weight: bold; }

        input { background: #000; border: 1px solid #444; color: var(--neon); padding: 15px; width: 280px; text-align: center; font-family: inherit; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="scrMenu" class="screen active">
        <div class="logo">DEAD MAN<br>BINGO</div>
        <button class="btn" onclick="hostGame()">СОЗДАТЬ ЛОББИ</button>
        <button class="btn" onclick="switchScreen('scrJoin')">ПОДКЛЮЧИТЬСЯ</button>
    </div>

    <div id="scrJoin" class="screen">
        <input type="text" id="gameIdInput" placeholder="ID ТЕРМИНАЛА...">
        <button class="btn" onclick="joinGame()">НАЧАТЬ</button>
        <button class="btn" style="border:none; color:#444" onclick="switchScreen('scrMenu')">НАЗАД</button>
    </div>

    <div id="scrGame" class="screen">
        <div id="gameIdLabel" style="font-size: 14px; color: var(--neon); margin-bottom: 5px;">ID: ...</div>
        <div class="status-box" id="status">ОЖИДАНИЕ ИГРОКА...</div>
        
        <div style="display:flex; gap:10px; margin-bottom:10px; width:100%; max-width:400px;">
            <button class="btn" id="rollBtn" style="margin:0; flex:1;" onclick="rollDice()">КУРОК</button>
            <div id="rollRes" style="width:60px; height:60px; border:2px solid var(--blood); display:flex; align-items:center; justify-content:center; font-size:30px; font-family:'Bebas Neue'; color:#f00;">—</div>
        </div>
        
        <div class="grid" id="grid"></div>
    </div>

    <script>
        // ВСТАВЬ СВОЙ КОНФИГ ИЗ FIREBASE НИЖЕ
        const firebaseConfig = {
            apiKey: "AIzaSyCE7WDfmIi5sMGpZpfLSi5vjpL7Mn2aLtA",
            authDomain: "fidelity-18c8a.firebaseapp.com",
            databaseURL: "https://fidelity-18c8a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fidelity-18c8a",
            storageBucket: "fidelity-18c8a.firebasestorage.app",
            messagingSenderId: "295762947740",
            appId: "1:295762947740:web:d059946a791238352ec759"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let gameId = "";
        let playerNum = 0;
        let gameState = null;

        const WORDS = ["БОЛЬ", "УЖАС", "ТЛЕН", "МОРГ", "ЯД", "БРЕД", "АГОНИЯ", "МРАК", "СТРАХ", "ПЫТКИ", "КРОВЬ", "КРИК", "ТЬМА", "ХАОС", "ГНИЛЬ", "СМЕРТЬ", "ПУСТОТА", "БЕЗДНА", "ШРАМ", "ГРЕХ", "ПЕТЛЯ", "ЗЛО", "РОК", "ГРОБ", "ТЕНЬ"];

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function hostGame() {
            gameId = Math.random().toString(36).substring(2, 8).toUpperCase();
            playerNum = 1;
            const initialData = {
                board: Array(25).fill(0),
                turn: 1,
                roll: null,
                players: 1
            };
            initialData.board[12] = 3; // Free center
            db.ref('games/' + gameId).set(initialData).then(() => {
                startListening();
            });
        }

        function joinGame() {
            gameId = document.getElementById('gameIdInput').value.trim().toUpperCase();
            if(!gameId) return;
            playerNum = 2;
            db.ref('games/' + gameId).once('value', snapshot => {
                if(snapshot.exists()) {
                    db.ref('games/' + gameId).update({ players: 2 });
                    startListening();
                } else {
                    alert("ID НЕ НАЙДЕН");
                }
            });
        }

        function startListening() {
            switchScreen('scrGame');
            document.getElementById('gameIdLabel').innerText = "ID: " + gameId;
            db.ref('games/' + gameId).on('value', snapshot => {
                gameState = snapshot.val();
                render();
                updateUI();
            });
        }

        function updateUI() {
            const isMyTurn = gameState.turn === playerNum;
            const status = document.getElementById('status');
            const rollBtn = document.getElementById('rollBtn');
            
            if(gameState.players < 2) {
                status.innerText = "ОЖИДАНИЕ ЖЕРТВЫ...";
                rollBtn.disabled = true;
            } else {
                status.innerText = isMyTurn ? "ТВОЙ ХОД" : "ВРАГ ГОТОВИТСЯ...";
                rollBtn.disabled = !isMyTurn || gameState.roll !== null;
            }
            document.getElementById('rollRes').innerText = gameState.roll || "—";
        }

        function rollDice() {
            const r = Math.floor(Math.random() * 6) + 1;
            db.ref('games/' + gameId).update({ roll: r });
        }

        function mark(i) {
            if(gameState.turn !== playerNum || !gameState.roll || gameState.board[i] !== 0) return;
            
            const col = i % 5;
            if(gameState.roll !== 6 && col !== (gameState.roll - 1)) return;

            const newBoard = [...gameState.board];
            newBoard[i] = playerNum;
            
            db.ref('games/' + gameId).update({
                board: newBoard,
                turn: playerNum === 1 ? 2 : 1,
                roll: null
            });
        }

        function render() {
            const g = document.getElementById('grid');
            g.innerHTML = '';
            gameState.board.forEach((v, i) => {
                const d = document.createElement('div');
                d.className = 'cell' + (v===1?' p1':v===2?' p2':v===3?' free':'');
                d.innerText = v === 3 ? "FREE" : WORDS[i];
                d.onclick = () => mark(i);
                g.appendChild(d);
            });
        }
    </script>
</body>
</html>
